name: matrix

# Shared defaults for the LinuxServer containers — anchored once,
# referenced via `<<: *lsio` to keep PUID/PGID/TZ in sync everywhere.
x-lsio-env: &lsio
  PUID: ${UID:-1000}
  PGID: ${GID:-1000}
  TZ: ${TZ:-UTC}

networks:
  matrix:
    name: matrix
    driver: bridge

services:
  #----------------------------- ADMINISTRATION -----------------------------
  homer:
    image: b4bz/homer:latest
    container_name: homer
    networks: [matrix]
    volumes:
      - ${HOMER_CONFIG}:/www/assets
    ports:
      - "9000:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    networks: [matrix]
    environment:
      PUID: ${UID:-1000}
      PGID: ${GID:-1000}
    volumes:
      - ${DOCKER_MAIN_ROUTE}:/srv
      - ${FILEBROWSER_DATABASE}:/database/filebrowser.db
      - ${FILEBROWSER_CONFIG}:/config/settings.json
    ports:
      - "8090:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  budgetzero:
    image: budgetzero/budgetzero:latest
    container_name: budgetzero
    networks: [matrix]
    ports:
      - "8091:8080"
    restart: unless-stopped

  #------------------------- NETWORK ADMINISTRATION -------------------------
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    networks: [matrix]
    ports:
      - "8000:80"
      - "81:81"
      - "443:443"
    volumes:
      - ${NGINXPM_CONFIG}:/data
      - ${NGINXPM_ETC}:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    networks: [matrix]
    # For DHCP, drop these ports and add: network_mode: host
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # - "67:67/udp"   # only if Pi-hole is your DHCP server
      - "80:80/tcp"
    environment:
      TZ: ${TZ:-UTC}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
    volumes:
      - ${PIHOLE_CONFIG}:/etc/pihole
      - ${PIHOLE_DNSMASQ}:/etc/dnsmasq.d
    # cap_add:
    #   - NET_ADMIN   # only if Pi-hole is your DHCP server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dig", "+short", "+norecurse", "@127.0.0.1", "pi.hole"]
      interval: 30s
      timeout: 5s
      retries: 3

  #------------------------------ MEDIA SERVER ------------------------------
  # Plex uses host networking for client discovery (GDM, DLNA).
  # It cannot join the `matrix` bridge.
  plex:
    image: jaymoulin/plex
    container_name: plex
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      PLEX_CLAIM: ${PLEX_CLAIM}
    volumes:
      - ${PLEX_CONFIG}:/config
      - ${PLEX_TEMP}:/transcode
      - ${PLEX_MEDIA}:/media
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    networks: [matrix]
    environment:
      <<: *lsio
      TRANSMISSION_WEB_HOME:
      USER: ${TRANSMISSION_USER}
      PASS: ${TRANSMISSION_PASS}
      WHITELIST:
      PEERPORT:
      HOST_WHITELIST:
    volumes:
      - ${TRANSMISSION_CONFIG}:/config
      - ${TRANSMISSION_DOWNLOADS}:/downloads
      - ${TRANSMISSION_WATCH}:/watch
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:9091/transmission/web/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${PLEX_MEDIA}/anime:/anime
      - ${PLEX_MEDIA}/series:/series
      - ${TRANSMISSION_DOWNLOADS}:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${PLEX_MEDIA}/movies:/movies
      - ${TRANSMISSION_DOWNLOADS}:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    networks: [matrix]
    environment:
      <<: *lsio
      AUTO_UPDATE: "true"
    volumes:
      - ${JACKETT_CONFIG}:/config
      - ${TRANSMISSION_DOWNLOADS}:/downloads
    ports:
      - "9117:9117"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:9117/UI/Dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3
