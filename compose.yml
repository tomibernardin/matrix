name: matrix

# Shared defaults for the LinuxServer containers — anchored once,
# referenced via `<<: *lsio` to keep PUID/PGID/TZ in sync everywhere.
x-lsio-env: &lsio
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  TZ: ${TZ:-UTC}

# Shared healthcheck timings — merge with `<<: *hc` and a per-service test.
x-healthcheck: &hc
  interval: 30s
  timeout: 5s
  retries: 3

networks:
  matrix:
    name: matrix
    driver: bridge

services:
  #----------------------------- ADMINISTRATION -----------------------------
  # Homepage replaces Homer — auto-discovers services via Docker labels
  # and ships with widgets for *arr, Plex, Transmission, etc.
  # See https://gethomepage.dev/ for label-based service config.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    networks: [matrix]
    # Run as the host user so writes into ${HOMEPAGE_CONFIG} land with the
    # right ownership; add the host's docker GID as a supplementary group
    # so the read-only docker.sock is accessible for service discovery.
    user: "${PUID:-1000}:${PGID:-1000}"
    group_add:
      - "${DOCKER_GID:-999}"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-*}
    volumes:
      - ${HOMEPAGE_CONFIG}:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9000:3000"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    networks: [matrix]
    # filebrowser/filebrowser ignores PUID/PGID (that's a LinuxServer
    # convention). It runs as root inside the container and writes via
    # the kernel mount, so host ownership is honoured directly.
    volumes:
      - ${DOCKER_MAIN_ROUTE}:/srv
      - ${FILEBROWSER_DATABASE}:/database/filebrowser.db
      - ${FILEBROWSER_CONFIG}:/config/settings.json
    ports:
      - "8090:80"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Files
      homepage.name: Filebrowser
      homepage.icon: filebrowser.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:8090
      homepage.description: Web file manager

  #------------------------- NETWORK ADMINISTRATION -------------------------
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    networks: [matrix]
    # NPM owns the host's HTTP/HTTPS ports — it's the single entry point.
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ${NGINXPM_CONFIG}:/data
      - ${NGINXPM_ETC}:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "/usr/bin/check-health"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Network
      homepage.name: Nginx Proxy Manager
      homepage.icon: nginx-proxy-manager.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:81
      homepage.description: Reverse proxy + Let's Encrypt
      homepage.widget.type: npm
      homepage.widget.url: http://nginx-proxy-manager:81
      homepage.widget.username: ${NPM_USERNAME}
      homepage.widget.password: ${NPM_PASSWORD}

  # AdGuard Home replaces Pi-hole — modern UI, built-in DoH/DoT/DoQ.
  # First-time setup runs at http://host:3000. Its admin UI is on host :8083
  # (host :80 belongs to NPM, the reverse proxy); :80 inside the container
  # is unchanged, so the homepage.widget.url stays http://adguardhome:80.
  adguardhome:
    # Pinned — manual-review upgrades; see README "Updating pinned images".
    image: adguard/adguardhome:v0.107.77
    container_name: adguardhome
    networks: [matrix]
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8083:80/tcp"        # admin UI (host :80 is NPM's)
      - "3000:3000/tcp"      # initial setup wizard
      - "853:853/tcp"        # DoT
      - "784:784/udp"        # DoQ
    volumes:
      - ${ADGUARD_WORK}:/opt/adguardhome/work
      - ${ADGUARD_CONF}:/opt/adguardhome/conf
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
    labels:
      homepage.group: Network
      homepage.name: AdGuard Home
      homepage.icon: adguard-home.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:8083/
      homepage.description: DNS + ad-block
      homepage.widget.type: adguard
      homepage.widget.url: http://adguardhome:80
      homepage.widget.username: ${ADGUARD_USERNAME}
      homepage.widget.password: ${ADGUARD_PASSWORD}

  #------------------------------ MEDIA SERVER ------------------------------
  # Plex uses host networking for client discovery (GDM, DLNA).
  # It cannot join the `matrix` bridge.
  plex:
    # Pinned — manual-review upgrades; see README "Updating pinned images".
    image: lscr.io/linuxserver/plex:1.43.2.10687-563d026ea-ls308
    container_name: plex
    network_mode: host
    environment:
      <<: *lsio
      VERSION: docker
      PLEX_CLAIM: ${PLEX_CLAIM}
    volumes:
      - ${PLEX_CONFIG}:/config
      - ${PLEX_TEMP}:/transcode
      - ${PLEX_MEDIA}:/media
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g
    labels:
      homepage.group: Media
      homepage.name: Plex
      homepage.icon: plex.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:32400/web
      homepage.description: Media server
      homepage.widget.type: plex
      homepage.widget.url: http://${HOMEPAGE_HOST:-localhost}:32400
      homepage.widget.key: ${PLEX_TOKEN}

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    networks: [matrix]
    environment:
      <<: *lsio
      USER: ${TRANSMISSION_USER}
      PASS: ${TRANSMISSION_PASS}
    volumes:
      - ${TRANSMISSION_CONFIG}:/config
      - ${TRANSMISSION_DOWNLOADS}:/downloads
      - ${TRANSMISSION_WATCH}:/watch
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-fSs", "http://localhost:9091/transmission/web/"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Automation
      homepage.name: Transmission
      homepage.icon: transmission.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:9091
      homepage.description: Torrent client
      homepage.widget.type: transmission
      homepage.widget.url: http://transmission:9091
      homepage.widget.username: ${TRANSMISSION_USER}
      homepage.widget.password: ${TRANSMISSION_PASS}

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${PLEX_MEDIA}/anime:/anime
      - ${PLEX_MEDIA}/series:/series
      - ${TRANSMISSION_DOWNLOADS}:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-fSs", "http://localhost:8989/ping"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Automation
      homepage.name: Sonarr
      homepage.icon: sonarr.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:8989
      homepage.description: TV automation
      homepage.widget.type: sonarr
      homepage.widget.url: http://sonarr:8989
      homepage.widget.key: ${SONARR_API_KEY}

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${PLEX_MEDIA}/movies:/movies
      - ${TRANSMISSION_DOWNLOADS}:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-fSs", "http://localhost:7878/ping"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Automation
      homepage.name: Radarr
      homepage.icon: radarr.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:7878
      homepage.description: Movie automation
      homepage.widget.type: radarr
      homepage.widget.url: http://radarr:7878
      homepage.widget.key: ${RADARR_API_KEY}

  # Prowlarr supersedes Jackett: indexers are defined once and pushed to
  # Sonarr/Radarr via its Apps sync, instead of being wired per-app.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${PROWLARR_CONFIG}:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-fSs", "http://localhost:9696/ping"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Automation
      homepage.name: Prowlarr
      homepage.icon: prowlarr.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:9696
      homepage.description: Indexer manager
      homepage.widget.type: prowlarr
      homepage.widget.url: http://prowlarr:9696
      homepage.widget.key: ${PROWLARR_API_KEY}

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${BAZARR_CONFIG}:/config
      - ${PLEX_MEDIA}/movies:/movies
      - ${PLEX_MEDIA}/series:/tv
      - ${PLEX_MEDIA}/anime:/anime
    ports:
      - "6767:6767"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-fSs", "http://localhost:6767/"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Media
      homepage.name: Bazarr
      homepage.icon: bazarr.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:6767
      homepage.description: Subtitle automation
      homepage.widget.type: bazarr
      homepage.widget.url: http://bazarr:6767
      homepage.widget.key: ${BAZARR_API_KEY}

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    networks: [matrix]
    environment:
      <<: *lsio
    volumes:
      - ${OVERSEERR_CONFIG}:/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "curl", "-fSs", "http://localhost:5055/api/v1/status"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Media
      homepage.name: Overseerr
      homepage.icon: overseerr.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:5055
      homepage.description: Plex content requests
      homepage.widget.type: overseerr
      homepage.widget.url: http://overseerr:5055
      homepage.widget.key: ${OVERSEERR_API_KEY}

  #------------------------------ OPERATIONS --------------------------------
  # Watchtower polls for new image tags and updates containers in place.
  # Opt-in model: only containers labelled
  # `com.centurylinklabs.watchtower.enable=true` are touched, so risky
  # services (Plex, AdGuard) stay pinned by default.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    networks: [matrix]
    environment:
      TZ: ${TZ:-UTC}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"     # 04:00 local, daily
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    # Watchtower updates itself too.
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  #---------------------------- OBSERVABILITY -------------------------------
  # cAdvisor exposes per-container CPU/mem/IO metrics on :8082.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks: [matrix]
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "8082:8080"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      homepage.group: Operations
      homepage.name: cAdvisor
      homepage.icon: mdi-chart-line
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:8082
      homepage.description: Container metrics

  # node-exporter exposes host-level metrics (disk, mem, cpu, fs). It joins
  # the bridge so Prometheus can scrape it by name; pid+rootfs mounts give it
  # the host view. No published port (scraped over the internal network) and
  # no healthcheck (the image has no wget/curl; Prometheus's scrape is the check).
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks: [matrix]
    pid: host
    command:
      - --path.rootfs=/rootfs
    volumes:
      - /:/rootfs:ro
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  prometheus:
    # Pinned — manual-review upgrades; see README "Updating pinned images".
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    networks: [matrix]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.path=/prometheus
    volumes:
      - ${PROMETHEUS_CONFIG}/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_CONFIG}/rules.yml:/etc/prometheus/rules.yml:ro
      - ${PROMETHEUS_DATA}:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
    labels:
      homepage.group: Operations
      homepage.name: Prometheus
      homepage.icon: prometheus.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:9090
      homepage.description: Metrics TSDB
      homepage.widget.type: prometheus
      homepage.widget.url: http://prometheus:9090

  grafana:
    # Pinned — manual-review upgrades; see README "Updating pinned images".
    image: grafana/grafana:13.0.2
    container_name: grafana
    networks: [matrix]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ${GRAFANA_DATA}:/var/lib/grafana
      - ${GRAFANA_PROVISIONING}:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
    labels:
      homepage.group: Operations
      homepage.name: Grafana
      homepage.icon: grafana.png
      homepage.href: http://${HOMEPAGE_HOST:-localhost}:3001
      homepage.description: Metrics dashboards
      homepage.widget.type: grafana
      homepage.widget.url: http://grafana:3000
      homepage.widget.username: admin
      homepage.widget.password: ${GRAFANA_ADMIN_PASSWORD}
