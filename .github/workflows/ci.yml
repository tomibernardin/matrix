name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Seed dummy .env for variable interpolation
        run: cp .env.example .env
      - name: Validate compose.yml
        run: docker compose config --quiet

  env-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check compose.yml vs .env.example drift
        run: bash scripts/check-env-drift.sh
