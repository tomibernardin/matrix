name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Seed dummy .env for variable interpolation
        run: cp .env.example .env
      - name: Validate compose.yml
        run: docker compose config --quiet

  env-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check compose.yml vs .env.example drift
        run: bash scripts/check-env-drift.sh

  setup-smoke:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run setup.sh as root with MATRIX_USER
        run: |
          apt-get update -qq
          apt-get install -y -qq curl ca-certificates
          useradd -m tester
          MATRIX_USER=tester bash setup.sh
      - name: Re-run to prove idempotency
        run: MATRIX_USER=tester bash setup.sh
      - name: Assert generated state
        run: |
          set -euxo pipefail
          test -f .env
          grep -q "^PUID=$(id -u tester)$" .env
          grep -q "^PGID=$(id -g tester)$" .env
          grep -qE "^DOCKER_GID=[0-9]+$" .env
          grep -qE "^TRANSMISSION_PASS=.{20,}$" .env
          [ "$(stat -c %a .env)" = "600" ]
          set -a; source .env; set +a
          test -d "${DOCKER_MAIN_ROUTE}/sonarr/config"
          test -d "${DOCKER_MAIN_ROUTE}/plex/media/movies"
          test -f "${FILEBROWSER_DATABASE}"
          test -f "${FILEBROWSER_CONFIG}"
          test -f "${DOCKER_MAIN_ROUTE}/prometheus/config/prometheus.yml"
          test -f "${DOCKER_MAIN_ROUTE}/prometheus/config/rules.yml"
          test -f "${DOCKER_MAIN_ROUTE}/grafana/provisioning/datasources/prometheus.yml"
          [ "$(stat -c %u "${DOCKER_MAIN_ROUTE}/grafana")" = "472" ]
          [ "$(stat -c %u "${DOCKER_MAIN_ROUTE}/prometheus/data")" = "65534" ]
          test -f /etc/cron.d/matrix-backup
